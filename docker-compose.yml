services:
  postgres:
    image: postgres:16
    container_name: postgres-dev

    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db

    ports:
      - "4000:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio-dev

    environment:
      MINIO_ROOT_USER: user-s3
      MINIO_ROOT_PASSWORD: password-s3

    command: server /data --address ":4001" --console-address ":4002"

    ports:
      - "4001:4001"
      - "4002:4002"

    volumes:
      - minio_data:/data

    restart: unless-stopped

volumes:
  postgres_data:
  minio_data: