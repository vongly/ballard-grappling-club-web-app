<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Cancelled</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        h1 {
            color: #c62828;
            margin-bottom: 10px;
        }

        p {
            color: #444;
            margin: 8px 0;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 16px;
            background: #c62828;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #9f1f1f;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>❌ Payment Cancelled</h1>

        <p>No worries — nothing was charged.</p>
        <p>You can try again anytime.</p>

        <a class="btn" href="/">Try Again</a>
    </div>
</body>
</html>
