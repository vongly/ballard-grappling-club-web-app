<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        h1 {
            color: #1a7f37;
            margin-bottom: 10px;
        }

        p {
            color: #444;
            margin: 8px 0;
        }

        .session {
            font-size: 12px;
            color: #888;
            word-break: break-all;
            margin-top: 15px;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 16px;
            background: #1a7f37;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #14632a;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🎉 Payment Successful</h1>

        <p>Your membership has been started.</p>
        <p>You can now access the gym system.</p>
        {% if session %}
        <div class="session">
            Session: {{ session.session_id }}
        </div>
        {% endif %}

        <a class="btn" href="/dashboard">Go to Dashboard</a>
    </div>
</body>
</html>
