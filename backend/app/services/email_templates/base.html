<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

  <body style="margin:0; padding:0; background-color:#f6f6f6; font-family: Arial, sans-serif;">

    <!-- Outer container -->
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f6f6f6; padding:20px 0;">
      <tr>
        <td align="center">

          <!-- Email container -->
          <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="background-color:#ffffff; border-radius:2px; overflow:hidden;">

            <!-- Logo Section -->
            <tr>
              <td align="center" bgcolor="#dfd6c6" style="background-color:#dfd6c6;">
                
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                  <tr>
                    <td align="center" style="padding:10px 20px 0px;">
                      <a href="{{ frontend_url }}">
                        <img src="https://ballardgrapplingclub.com/logo/main_compass_svg"
                            alt="Logo"
                            width="240"
                            style="display:block;">
                      </a>
                    </td>
                  </tr>
                </table>

              </td>
            </tr>
            <!-- Content Block -->
            <tr>
              <td style="padding:30px 40px; color:#111827;">
                {% block content %}{% endblock %}
                <p>
                  <strong>
                    Ballard Grappling Club
                  </strong>
                </p>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding:20px 40px; font-size:12px; color:#6b7280; text-align:center; background-color:#f9fafb;">
                <p style="margin:0;">
                  © {{ year or "2026" }} Your Brand. All rights reserved.
                </p>
              </td>
            </tr>

          </table>

        </td>
      </tr>
    </table>

  </body>
</html>
